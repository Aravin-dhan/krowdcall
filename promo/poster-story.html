<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Cruxd - Story Format (1080x1920)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    background: #000000;
    color: #f4f4f5;
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    top: 200px;
    left: 50%;
    transform: translateX(-50%);
    width: 1000px;
    height: 1000px;
    background: radial-gradient(circle, rgba(233,90,46,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  .top {
    padding: 80px 64px 0;
  }

  .brand {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #5a5a5f;
  }

  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 64px;
    gap: 40px;
  }

  .stat-block {
    text-align: center;
  }

  .stat-number {
    font-size: 180px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -8px;
    background: linear-gradient(180deg, #f4f4f5 0%, #5a5a5f 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-label {
    font-size: 28px;
    font-weight: 500;
    color: #8d8d93;
    margin-top: 8px;
  }

  .question-block {
    background: #0a0a0a;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 36px 40px;
    text-align: center;
  }

  .question-eyebrow {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #e95a2e;
    margin-bottom: 16px;
  }

  .question-text {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 28px;
  }

  .odds-bar {
    display: flex;
    height: 56px;
    border-radius: 14px;
    overflow: hidden;
    font-size: 20px;
    font-weight: 800;
  }

  .odds-yes {
    flex: 68;
    background: #1ec97b;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .odds-no {
    flex: 32;
    background: #ff5c5c;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .prompt {
    text-align: center;
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .prompt em {
    font-style: normal;
    color: #1ec97b;
  }

  .bottom {
    padding: 0 64px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .cta-btn {
    display: inline-block;
    padding: 22px 64px;
    background: #f4f4f5;
    color: #000;
    font-size: 22px;
    font-weight: 800;
    border-radius: 16px;
  }

  .fine-print {
    font-size: 15px;
    color: #5a5a5f;
  }
</style>
</head>
<body>
  <div class="top">
    <div class="brand">Cruxd</div>
  </div>

  <div class="hero">
    <div class="stat-block">
      <div class="stat-number">68%</div>
      <div class="stat-label">of the crowd says YES</div>
    </div>

    <div class="question-block">
      <div class="question-eyebrow">West Bengal 2026</div>
      <div class="question-text">Will TMC win a majority<br>in West Bengal?</div>
      <div class="odds-bar">
        <div class="odds-yes">YES 68%</div>
        <div class="odds-no">NO 32%</div>
      </div>
    </div>

    <p class="prompt">Do you agree?<br>Or are <em>you</em> smarter?</p>
  </div>

  <div class="bottom">
    <span class="cta-btn">Make your call</span>
    <span class="fine-print">cruxd.in &middot; Free &middot; No real money &middot; 18+</span>
  </div>
</body>
</html>
